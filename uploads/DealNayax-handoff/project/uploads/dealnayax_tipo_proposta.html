<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipo de Proposta — DealNayax</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --y:#FFCD00; --yd:#E6B800; --yg:rgba(255,205,0,0.12); --yb:rgba(255,205,0,0.25);
  --dark:#1A1A1A; --g2:#262626; --g3:#3A3A3A;
  --bg:#F5F5F5; --white:#FFFFFF;
  --txt:#111111; --txt2:#555555; --txt3:#999999;
  --bdr:#E0E0E0; --bdr2:#CCCCCC;
  --green:#059669; --green-bg:#D1FAE5;
  --r:8px; --r-lg:14px;
  --sh:0 2px 12px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05);
  --sh-h:0 8px 28px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.06);
  --sh-y:0 4px 20px rgba(255,205,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}

/* MODAL */
.modal{
  background:var(--white);border-radius:20px;width:100%;max-width:600px;
  box-shadow:0 32px 80px rgba(0,0,0,0.4),0 8px 24px rgba(0,0,0,0.2);
  overflow:hidden;
}
.modal-header{
  background:var(--dark);padding:20px 24px;
  border-bottom:3px solid var(--y);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;color:var(--white)}
.modal-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.modal-close{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);
  border:none;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-close:hover{background:rgba(255,255,255,0.15);color:white}

.modal-body{padding:24px}
.section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--txt3);margin-bottom:12px;
}

/* TYPE GRID */
.type-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;
}
.type-card{
  border:2px solid var(--bdr);border-radius:var(--r);padding:12px 8px;
  text-align:center;cursor:pointer;transition:all .18s;background:var(--white);
  position:relative;
}
.type-card:hover{border-color:var(--yd);transform:translateY(-2px);box-shadow:var(--sh-h)}
.type-card.selected{
  border-color:var(--y);background:rgba(255,205,0,0.06);
  box-shadow:0 0 0 3px rgba(255,205,0,0.2);
}
.type-card .check{
  position:absolute;top:6px;right:6px;width:16px;height:16px;
  background:var(--y);border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:9px;color:var(--dark);font-weight:800;
}
.type-card.selected .check{display:flex}
.type-code{
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;
  color:var(--dark);margin-bottom:4px;
}
.type-card.selected .type-code{color:var(--yd)}
.type-desc{font-size:10px;color:var(--txt3);line-height:1.4}
.type-seq{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3);
  margin-top:5px;
}

/* PREVIEW ROW */
.preview-row{
  background:var(--bg);border-radius:var(--r);padding:14px 16px;
  margin-bottom:20px;display:flex;align-items:center;gap:14px;
}
.prev-label{font-size:11px;color:var(--txt3);white-space:nowrap}
.prev-code{
  font-family:'DM Mono',monospace;font-size:18px;font-weight:700;
  color:var(--dark);letter-spacing:1px;flex:1;transition:all .2s;
}
.prev-code span{color:var(--yd)}
.copy-btn{
  padding:6px 12px;background:var(--dark);color:var(--white);border:none;
  border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;
}
.copy-btn:hover{background:var(--g2);transform:scale(1.02)}
.copy-btn.copied{background:var(--green);color:white}

/* NUMBERING EXPLAINER */
.num-explain{
  background:var(--dark);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;
}
.ne-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ne-title::before{content:'';width:3px;height:14px;background:var(--y);border-radius:2px;display:inline-block}
.ne-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ne-item{background:rgba(255,255,255,0.05);border-radius:5px;padding:7px 8px;text-align:center}
.ne-code{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--y)}
.ne-next{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}

/* ACTION BUTTONS */
.actions{display:flex;gap:10px}
.btn{
  flex:1;padding:12px;border-radius:var(--r);font-size:13px;font-weight:600;
  cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;
}
.btn-primary{background:var(--y);color:var(--dark)}
.btn-primary:hover{background:var(--yd);box-shadow:var(--sh-y);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--txt2);border:1.5px solid var(--bdr)}
.btn-ghost:hover{border-color:var(--bdr2);color:var(--txt)}

/* HINT */
.hint{text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,0.3)}
.hint strong{color:rgba(255,255,255,0.5)}

/* Sparkle animation */
@keyframes pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.type-card.selected{animation:pop .2s ease}
</style>
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <div>
      <div class="modal-title">Novo Orçamento — Tipo de Proposta</div>
      <div class="modal-sub">Selecione o tipo para gerar o número da proposta</div>
    </div>
    <button class="modal-close">✕</button>
  </div>

  <div class="modal-body">

    <div class="section-label">Tipo de proposta</div>

    <div class="type-grid" id="typeGrid">
      <!-- JS rendered -->
    </div>

    <!-- PREVIEW -->
    <div class="preview-row">
      <div class="prev-label">Número gerado</div>
      <div class="prev-code" id="previewCode">—</div>
      <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copiar</button>
    </div>

    <!-- NUMBERING TABLE -->
    <div class="num-explain">
      <div class="ne-title">Próximos números por tipo</div>
      <div class="ne-grid" id="seqGrid"></div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost">Cancelar</button>
      <button class="btn btn-primary" id="confirmBtn" disabled onclick="confirm()">
        Criar orçamento →
      </button>
    </div>

  </div>
</div>

<div class="hint">
  Os números são sequenciais e <strong>nunca se repetem</strong> por tipo de proposta.
</div>

<script>
const TYPES = [
  { code:'NOVO',    label:'Novo cliente',        desc:'Primeiro contrato\ncom o cliente',         seq:493, prefix:'COM' },
  { code:'BASE',    label:'Base instalada',       desc:'Renovação ou\nampliar base',               seq:582, prefix:'BASE' },
  { code:'DEM',     label:'Demonstração',         desc:'Proposta de\ndemo/avaliação',              seq:714, prefix:'DEM' },
  { code:'MIGR',    label:'Migração',             desc:'Migração de\noutro sistema',               seq:13,  prefix:'MIGR' },
  { code:'FORM',    label:'Formatação',           desc:'Mudança de\nconfiguração',                 seq:97,  prefix:'FORM' },
  { code:'UPGRADE', label:'Upgrade',              desc:'Atualização de\nhardware/software',         seq:666, prefix:'UPGR' },
  { code:'RETCOM',  label:'Retomada com.',        desc:'Reativação de\ncliente inativo',            seq:59,  prefix:'RETCOM' },
];

// Starting sequences per type (from requirements)
const STARTS = {
  NOVO:492, BASE:581, DEM:713, MIGR:12, FORM:96, UPGRADE:665, RETCOM:58
};

let selectedType = null;
let currentNumber = null;

function pad(n, len) {
  return String(n).padStart(len, '0');
}

function getNextNum(type) {
  const start = STARTS[type.code] || 1;
  // Simulate sequential: start + 1 (in real app, this would come from DB)
  return start + 1;
}

function getCode(type) {
  const n = getNextNum(type);
  // Format: PREFIX + 4-digit number
  const numStr = pad(n, 4);
  return `COM${type.code}${numStr}`;
}

function renderTypes() {
  const grid = document.getElementById('typeGrid');
  grid.innerHTML = TYPES.map(t => `
    <div class="type-card" onclick="selectType('${t.code}')" id="card-${t.code}">
      <div class="check">✓</div>
      <div class="type-code">${t.code}</div>
      <div class="type-desc">${t.desc.replace('\n','<br>')}</div>
      <div class="type-seq">#${pad(getNextNum(t),4)}</div>
    </div>
  `).join('');
}

function renderSeqGrid() {
  const grid = document.getElementById('seqGrid');
  grid.innerHTML = TYPES.map(t => `
    <div class="ne-item">
      <div class="ne-code">${t.code}</div>
      <div class="ne-next">→ ${pad(getNextNum(t),4)}</div>
    </div>
  `).join('');
}

function selectType(code) {
  // Remove selected from all
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  // Select clicked
  const card = document.getElementById('card-'+code);
  card.classList.add('selected');
  selectedType = TYPES.find(t => t.code === code);
  
  // Update preview
  const num = getNextNum(selectedType);
  const fullCode = `COM${code}${pad(num,4)}`;
  currentNumber = fullCode;
  
  const preview = document.getElementById('previewCode');
  preview.innerHTML = `<span>COM</span>${code}<span>${pad(num,4)}</span>`;
  
  // Enable confirm
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = `Criar orçamento ${fullCode} →`;
  
  // Reset copy button
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Copiar';
  copyBtn.className = 'copy-btn';
}

function copyCode() {
  if (!currentNumber) return;
  navigator.clipboard.writeText(currentNumber).catch(()=>{});
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'Copiado!';
  btn.className = 'copy-btn copied';
  setTimeout(() => {
    btn.textContent = 'Copiar';
    btn.className = 'copy-btn';
  }, 2000);
}

function confirm() {
  if (!selectedType) return;
  // In real app: increment counter in DB and navigate to new quote
  alert(`Orçamento ${currentNumber} criado!\nTipo: ${selectedType.code} — ${selectedType.label}\nRedirecionando para o orçamento...`);
}

renderTypes();
renderSeqGrid();
</script>
</body>
</html>
